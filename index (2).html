<input type=file id=myFile multiple>

<script>window.oninput=function(){window.newOrder=Object.values(myFile.files);files.innerHTML='';var index=0;
for (let file of myFile.files) {
    files.innerHTML+=`<h6 id=song${index+1} data-file=${index} data-song=${index}>${file.name}</h6>`;index++
};window.onclick=function(event){window.selectFile=(newOrder[document.elementFromPoint(event.clientX,event.clientY).dataset.song])};window.onkeydown=function(event){if(event.key==='ArrowUp'){moveUp(newOrder,newOrder.indexOf(selectFile));files.innerHTML='';var index=0;
for (let file of newOrder) {
    files.innerHTML+=`<h6 id=song${index+1} data-file=${Object.values(myFile.files).indexOf(file)} data-song=${index}>${file.name}</h6>`;index++
};};if(event.key==='ArrowDown'){moveDown(newOrder,newOrder.indexOf(selectFile));files.innerHTML='';var index=0;
for (let file of newOrder) {
    files.innerHTML+=`<h6 id=song${index+1} data-file=${Object.values(myFile.files).indexOf(file)} data-song=${index}>${file.name}</h6>`;index++
};}}};
window.moveUp=function(arr,index){moveItem(arr,index,index-1)};window.moveDown=function(arr,index){moveItem(arr,index,index+1)}
const moveItem = (arr, fromIndex, toIndex) => {
  const [item] = arr.splice(fromIndex, 1); // Remove item
  arr.splice(toIndex, 0, item);           // Insert at new index
};


function listfiles() {
    var indexes=0
    for (let index of myFile.files) {
        console.log(indexes+" - "+index.name)
        indexes++
    }
}
function time(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function downloadUrl(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || url.split('/').pop(); // Suggest a filename
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

async function reorder(){
    var filecount=newOrder.length
    for (let index of newOrder) {
        downloadUrl(URL.createObjectURL(myFile.files[Number((document.getElementById('song'+(filecount))).dataset.file)]),"0"+filecount+" - "+myFile.files[Number((document.getElementById('song'+(filecount))).dataset.file)].name.slice(myFile.files[Number((document.getElementById('song'+(filecount))).dataset.file)].name.indexOf("- ")+2,99999))
        filecount--
        await time(2500)
    }
}</script><button onclick="reorder()">Update</button><div id=files>
